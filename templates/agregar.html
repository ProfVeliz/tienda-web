<!DOCTYPE html>
<html>
<head>
    <title>Agregar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h2>Agregar Artículo</h2>

    <form method="POST" enctype="multipart/form-data" class="card p-4 bg-secondary">

        <input class="form-control mb-3" type="text" name="nombre" placeholder="Nombre">

        <input class="form-control mb-3" type="number" name="precio" placeholder="Precio">

        <input class="form-control mb-3" type="number" name="stock" placeholder="Stock">

        <input class="form-control mb-3" type="file" name="foto">

        <button class="btn btn-success">Guardar</button>

    </form>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Producto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="d-flex">

    <!-- MENU LATERAL -->
    <div class="bg-black p-3" style="width: 220px; min-height: 100vh;">
        <h4>🛒 Tienda</h4>
        <hr>

        <a href="/" class="d-block text-white mb-2">🏠 Dashboard</a>
        <a href="/agregar" class="d-block text-white mb-2">➕ Agregar</a>
    </div>

    <!-- CONTENIDO -->
    <div class="flex-grow-1 p-4">

        <h2>Agregar Producto</h2>

        <div class="card bg-secondary p-4 mt-3" style="max-width: 500px;">

            <!-- ⚠️ IMPORTANTE enctype -->
            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Nombre del producto" required>
                </div>

                <div class="mb-3">
                    <label>Precio</label>
                    <input type="number" step="0.01" name="precio" class="form-control" placeholder="Precio" required>
                </div>

                <div class="mb-3">
                    <label>Stock</label>
                    <input type="number" name="stock" class="form-control" placeholder="Cantidad en stock" required>
                </div>

                <div class="mb-3">
                    <label>Foto</label>
                    <input type="file" name="foto" class="form-control" required>
                </div>

                <button class="btn btn-success w-100">Guardar</button>

            </form>

        </div>

    </div>

</div>

</body>
</html>

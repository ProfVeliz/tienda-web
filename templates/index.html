<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#0f172a; color:white; }
.sidebar { width:240px; min-height:100vh; background:linear-gradient(#141e30,#243b55); padding:20px;}
.menu-link {display:block;color:white;padding:10px;border-radius:8px;margin-bottom:5px;text-decoration:none;}
.menu-link:hover {background:rgba(255,255,255,0.2);}
.card {border-radius:15px;}
</style>
</head>

<body>
<div class="d-flex">

<div class="sidebar">
<h4>🛒 Tienda</h4>
<a href="/" class="menu-link">Dashboard</a>
<a href="/agregar" class="menu-link">Agregar</a>

<hr>

<a href="/reporte/dia" class="btn btn-info w-100 mb-2">📅 Reporte Día</a>
<a href="/reporte/semana" class="btn btn-primary w-100">📊 Reporte Semana</a>
</div>

<div class="p-4 w-100">

<h2>Ventas Totales: Q{{ total_ventas }}</h2>

<div class="row">

{% for p in productos %}
<div class="col-md-3">
<div class="card bg-dark p-2 mb-3">

<img src="{{ p.imagen }}" style="height:200px;object-fit:cover;">

<h5>{{ p.nombre }}</h5>
<p>Q{{ p.precio }}</p>

{% if p.stock < 5 %}
<span class="badge bg-danger">Stock bajo</span>
{% endif %}

<p>Stock: {{ p.stock }}</p>

<form action="/vender/{{ p.id }}" method="POST">
<input type="number" name="cantidad" class="form-control mb-1" placeholder="Cantidad" required>
<button class="btn btn-success w-100">💰 Vender</button>
</form>

<a href="/editar/{{ p.id }}" class="btn btn-warning w-100 mt-1">Editar</a>
<a href="/eliminar/{{ p.id }}" class="btn btn-danger w-100 mt-1">Eliminar</a>

</div>
</div>
{% endfor %}

</div>
</div>

</div>
</body>
</html>

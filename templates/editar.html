<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<h2>Editar Producto</h2>

<div class="card bg-secondary p-4">

<form method="POST" enctype="multipart/form-data">

<input name="nombre" value="{{ producto.nombre }}" class="form-control mb-2">

<input name="precio" value="{{ producto.precio }}" class="form-control mb-2">

<input name="stock" value="{{ producto.stock }}" class="form-control mb-2">

<img src="{{ producto.imagen }}" width="150" class="mb-2">

<input type="file" name="foto" class="form-control mb-2">

<button class="btn btn-warning w-100">Actualizar</button>

</form>

</div>

</div>

</body>
</html>
